{# Shared CSS + JS for the "P/E forward storico 5y" sparkline.
   Included by screener.html and portfolio.html.

   Card markup is generated by each parent. The slot is a div with
   data-pe-history="TICKER" — hydratePEHistoryWithin(root) fetches and
   renders inside any such slots found under `root`.
#}
<style>
    .pe-history {
        margin-top: 0.7rem;
        background: rgba(13,27,42,0.45);
        border-radius: 8px;
        padding: 0.55rem 0.75rem;
        font-size: 0.78rem;
        color: #cbd5e1;
    }
    .pe-history .ph-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
        gap: 0.5rem;
        flex-wrap: wrap;
    }
    .pe-history .ph-title {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #778da9;
        font-weight: 600;
    }
    .pe-history .ph-summary { color: #e2e8f0; }
    .pe-history .ph-summary strong { color: #fff; }
    .pe-history .ph-buy-badge {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: rgba(74,222,128,0.22);
        color: #4ade80;
        border: 1px solid rgba(74,222,128,0.5);
    }
    .pe-history .ph-buy-badge.dim {
        background: rgba(119,141,169,0.12);
        color: #778da9;
        border-color: rgba(119,141,169,0.3);
    }
    .pe-history .ph-toggle {
        background: rgba(119,141,169,0.12);
        color: #adb5bd;
        border: 1px solid rgba(119,141,169,0.3);
        border-radius: 6px;
        padding: 0.1rem 0.5rem;
        font-size: 0.85rem;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s;
    }
    .pe-history .ph-toggle:hover {
        background: rgba(119,141,169,0.25);
        color: #fff;
        border-color: rgba(255,255,255,0.4);
    }

    .pe-history .ph-chart-wrap {
        position: relative;
        width: 100%;
        height: 110px;
        transition: height 0.2s ease;
    }
    .pe-history .ph-chart-wrap.expanded { height: 300px; }

    /* Reserve right gutter for Y-axis labels (out-of-SVG) */
    .pe-history .ph-chart-wrap svg {
        display: block;
        width: calc(100% - 60px);
        height: 100%;
    }
    .pe-history .ph-line {
        fill: none;
        stroke: #60a5fa;
        stroke-width: 1.5;
        vector-effect: non-scaling-stroke;
    }
    .pe-history .ph-band-q1 { fill: rgba(74,222,128,0.15); }
    .pe-history .ph-band-q3 { fill: rgba(119,141,169,0.08); }
    .pe-history .ph-axis {
        stroke: rgba(119,141,169,0.45);
        stroke-width: 1;
        stroke-dasharray: 2 3;
        vector-effect: non-scaling-stroke;
    }
    .pe-history .ph-current-dot {
        fill: #fff;
        stroke: #4ade80;
        stroke-width: 2;
        vector-effect: non-scaling-stroke;
    }
    .pe-history .ph-current-dot.expensive { stroke: #f87171; }
    .pe-history .ph-current-dot.fair { stroke: #fbbf24; }

    /* HTML overlay labels (outside the stretched SVG so font stays sharp) */
    .pe-history .ph-yaxis-label {
        position: absolute;
        right: 0;
        transform: translateY(-50%);
        font-size: 0.7rem;
        font-weight: 600;
        background: rgba(13,27,42,0.85);
        padding: 0.05rem 0.35rem;
        border-radius: 3px;
        white-space: nowrap;
        pointer-events: none;
        line-height: 1.2;
    }
    .pe-history .ph-yaxis-label.q1      { color: #4ade80; }
    .pe-history .ph-yaxis-label.med     { color: #fbbf24; }
    .pe-history .ph-yaxis-label.q3     { color: #cbd5e1; }
    .pe-history .ph-yaxis-label.current { color: #fff; border: 1px solid rgba(74,222,128,0.5); }
    .pe-history .ph-yaxis-label.current.expensive { border-color: rgba(248,113,113,0.5); }
    .pe-history .ph-yaxis-label.current.fair      { border-color: rgba(251,191,36,0.5); }

    .pe-history .ph-xaxis-label {
        position: absolute;
        bottom: 0;
        font-size: 0.65rem;
        color: #778da9;
        pointer-events: none;
        white-space: nowrap;
    }

    .pe-history .ph-zone-dates {
        margin-top: 0.4rem;
        font-size: 0.72rem;
        color: #adb5bd;
        line-height: 1.6;
    }
    .pe-history .ph-zone-dates strong { color: #4ade80; }
    .pe-history .ph-zone-entry {
        display: inline-block;
        margin-right: 0.2rem;
    }
    .pe-history .ph-zone-entry .ph-zone-pe {
        color: #778da9;
        font-size: 0.68rem;
    }

    .pe-history .ph-peaks {
        margin-top: 0.25rem;
        font-size: 0.7rem;
        color: #778da9;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }
    .pe-history .ph-peak strong { color: #e2e8f0; }
    .pe-history .ph-peak.peak-max { color: #fca5a5; }
    .pe-history .ph-peak.peak-max strong { color: #f87171; }
    .pe-history .ph-peak.peak-min { color: #86efac; }
    .pe-history .ph-peak.peak-min strong { color: #4ade80; }

    /* Chart markers (HTML overlay, kept square regardless of SVG stretch) */
    .pe-history .ph-marker-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: calc(100% - 60px);
        height: 100%;
        pointer-events: none;
    }
    .pe-history .ph-marker {
        position: absolute;
        width: 0;
        height: 0;
        pointer-events: auto;
        cursor: help;
    }
    .pe-history .ph-marker.buy {
        /* down-pointing triangle, sits above the data point */
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 9px solid #4ade80;
        transform: translate(-50%, -180%);
        filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
    }
    .pe-history .ph-marker.max {
        /* up-pointing triangle, sits below the data point */
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 9px solid #f87171;
        transform: translate(-50%, 80%);
        filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
    }
    .pe-history .ph-loading,
    .pe-history .ph-unavailable {
        color: #778da9;
        font-style: italic;
        font-size: 0.72rem;
    }
</style>

<script>
    // ============================================================================
    // Forward P/E history sparkline (Serafini "zona di ricarico storica")
    // ----------------------------------------------------------------------------
    // Lazy-fetches /api/screener/pe-history/<ticker> for each .pe-history slot
    // under a root element, renders a 5y sparkline with Q1/Q3 bands, and emits
    // a buy-zone badge when the current forward P/E is at/below Q1 historical.
    // Each slot supports expand/collapse via the toggle button in its header.
    // ============================================================================

    (function () {
        const cache = new Map();

        window.hydratePEHistoryWithin = function (rootEl) {
            if (!rootEl) return;
            const slots = rootEl.querySelectorAll('[data-pe-history]');
            slots.forEach(slot => {
                const ticker = slot.getAttribute('data-pe-history');
                if (!ticker) return;
                if (cache.has(ticker)) {
                    renderInto(slot, cache.get(ticker));
                    return;
                }
                fetch('/api/screener/pe-history/' + encodeURIComponent(ticker))
                    .then(res => res.ok ? res.json() : Promise.reject(res))
                    .then(data => {
                        cache.set(ticker, data);
                        renderInto(slot, data);
                    })
                    .catch(() => {
                        slot.innerHTML = unavailableHtml();
                    });
            });
        };

        function unavailableHtml() {
            return `
                <div class="ph-header">
                    <span class="ph-title">P/E forward storico 5y</span>
                    <span class="ph-unavailable">dati non disponibili</span>
                </div>`;
        }

        function renderInto(slot, data) {
            const stats = (data && data.stats) || {};
            const series = (data && data.series) || [];
            if (!series.length || stats.q1 == null) {
                slot.innerHTML = unavailableHtml();
                return;
            }
            const expanded = slot.getAttribute('data-expanded') === '1';
            const inZone = !!stats.in_buy_zone;
            const curPct = stats.current_percentile;
            const dotClass = inZone
                ? ''
                : (curPct != null && curPct > 75 ? 'expensive' : 'fair');

            const badge = inZone
                ? `<span class="ph-buy-badge" title="P/E attuale ≤ Q1 storico">Zona ricarico storica</span>`
                : `<span class="ph-buy-badge dim">P/E ${fmt(stats.current_pe)}x · ${fmt(curPct)}° perc.</span>`;

            const lastZones = lastBuyZoneEntries(series, stats.q1, 3);
            const chart = buildChart(series, stats, expanded, dotClass, lastZones);

            const fmtPrice = p => '$' + (p >= 100 ? p.toFixed(0) : p.toFixed(2));
            const zonesHtml = lastZones.length
                ? `<div class="ph-zone-dates"><strong style="color:#778da9;font-weight:600;">Ultime zone Q1 (≤ ${stats.q1}x):</strong>
                       ${lastZones.map(z =>
                           `<span class="ph-zone-entry"><strong>${z.date}</strong> a <strong>${fmtPrice(z.price)}</strong> <span class="ph-zone-pe">(${z.pe}x)</span></span>`
                       ).join(' · ')}</div>`
                : '';

            // Picchi storici: max + min P/E with their dates & prices.
            let peaksHtml = '';
            if (stats.max_pe_value != null && stats.min_pe_value != null) {
                peaksHtml = `
                    <div class="ph-peaks">
                        <span class="ph-peak peak-max" title="P/E più alto della serie 5y — il momento più caro">
                            ▲ max <strong>${stats.max_pe_value}x</strong>
                            il ${stats.max_pe_date} a <strong>${fmtPrice(stats.max_pe_price)}</strong>
                        </span>
                        <span class="ph-peak peak-min" title="P/E più basso della serie 5y — il bottom storico">
                            ▼ min <strong>${stats.min_pe_value}x</strong>
                            il ${stats.min_pe_date} a <strong>${fmtPrice(stats.min_pe_price)}</strong>
                        </span>
                    </div>`;
            }

            const toggleIcon = expanded ? '⊟' : '⊞';
            const toggleTitle = expanded ? 'Comprimi grafico' : 'Espandi grafico';

            slot.innerHTML = `
                <div class="ph-header">
                    <span class="ph-title">P/E forward storico 5y</span>
                    <span class="ph-summary">
                        Q1 <strong>${stats.q1}x</strong> ·
                        med <strong>${stats.median}x</strong> ·
                        Q3 <strong>${stats.q3}x</strong>
                    </span>
                    ${badge}
                    <button type="button" class="ph-toggle" data-action="toggle-ph"
                            title="${toggleTitle}" aria-label="${toggleTitle}">${toggleIcon}</button>
                </div>
                <div class="ph-chart-wrap${expanded ? ' expanded' : ''}">
                    ${chart.svg}
                    ${chart.markersWrap || ''}
                    ${chart.labels}
                    ${chart.xLabels}
                </div>
                ${zonesHtml}
                ${peaksHtml}
            `;

            const btn = slot.querySelector('[data-action="toggle-ph"]');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    slot.setAttribute('data-expanded', expanded ? '0' : '1');
                    renderInto(slot, data);
                });
            }
        }

        function fmt(v) {
            return (v == null || isNaN(v)) ? '—' : v;
        }

        function pickPercentile(sortedArr, p) {
            if (!sortedArr.length) return null;
            const k = (sortedArr.length - 1) * (p / 100);
            const f = Math.floor(k);
            const c = Math.min(f + 1, sortedArr.length - 1);
            if (f === c) return sortedArr[f];
            return sortedArr[f] + (sortedArr[c] - sortedArr[f]) * (k - f);
        }

        function lastBuyZoneEntries(series, q1, maxOut) {
            // Returns up to maxOut entries — start-of-period when P/E first
            // dipped to/below Q1 — with index, date, pe, price.
            if (!series.length || q1 == null) return [];
            const out = [];
            let inZone = false;
            for (let i = 0; i < series.length; i++) {
                const s = series[i];
                const below = s.pe <= q1;
                if (below && !inZone) {
                    out.push({ idx: i, date: s.date, pe: s.pe, price: s.price });
                    inZone = true;
                } else if (!below) {
                    inZone = false;
                }
            }
            return out.slice(-maxOut);
        }

        function buildChart(series, stats, expanded, dotClass, buyZoneEntries) {
            // Robust Y range: clip to ~5th-95th percentile so the few crazy
            // post-IPO / pre-earnings outliers don't squash the line.
            const sortedPe = series.map(s => s.pe).slice().sort((a, b) => a - b);
            const p05 = pickPercentile(sortedPe, 5);
            const p95 = pickPercentile(sortedPe, 95);
            const yMin = Math.max(
                0,
                Math.min(p05, stats.q1, stats.current_pe == null ? stats.q1 : stats.current_pe) * 0.92
            );
            const yMax = Math.max(p95, stats.q3, stats.current_pe || 0) * 1.10;
            const span = yMax - yMin || 1;

            // viewBox dims chosen to match the rendered pixel height so y values
            // are 1:1 with HTML overlay positioning.
            const W = 1000;
            const H = expanded ? 300 : 110;
            const padT = 6;
            const padB = expanded ? 26 : 6;
            const plotH = H - padT - padB;

            const xOf = i => (W * i) / Math.max(1, series.length - 1);
            const yOf = pe => {
                const clamped = Math.min(Math.max(pe, yMin), yMax);
                return padT + plotH * (1 - (clamped - yMin) / span);
            };

            const yQ1 = yOf(stats.q1);
            const yMed = yOf(stats.median);
            const yQ3 = yOf(stats.q3);

            const bandQ1 = `<rect class="ph-band-q1" x="0" y="${yQ1.toFixed(1)}"
                            width="${W}" height="${(padT + plotH - yQ1).toFixed(1)}" />`;
            const bandQ3 = `<rect class="ph-band-q3" x="0" y="${padT}"
                            width="${W}" height="${(yQ3 - padT).toFixed(1)}" />`;
            const medianLine = `<line class="ph-axis" x1="0" y1="${yMed.toFixed(1)}"
                                x2="${W}" y2="${yMed.toFixed(1)}" />`;
            const linePoints = series
                .map((s, i) => `${xOf(i).toFixed(1)},${yOf(s.pe).toFixed(1)}`)
                .join(' ');

            let dot = '';
            if (stats.current_pe != null) {
                const cy = yOf(stats.current_pe);
                const cx = W - 6;
                const r = expanded ? 6 : 5;
                dot = `<circle class="ph-current-dot ${dotClass}"
                              cx="${cx}" cy="${cy.toFixed(1)}" r="${r}" />`;
            }

            const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
                ${bandQ3}${bandQ1}
                ${medianLine}
                <polyline class="ph-line" points="${linePoints}" />
                ${dot}
            </svg>`;

            // Chart markers (HTML overlay, kept square regardless of SVG stretch).
            // Only rendered when expanded — would be illegible at 110px height.
            let markersHtml = '';
            if (expanded) {
                const fmtP = p => '$' + (p >= 100 ? p.toFixed(0) : p.toFixed(2));
                if (Array.isArray(buyZoneEntries)) {
                    buyZoneEntries.forEach(z => {
                        const xPct = (xOf(z.idx) / W * 100).toFixed(1);
                        const yPct = (yOf(z.pe) / H * 100).toFixed(1);
                        markersHtml += `<span class="ph-marker buy"
                            style="left: ${xPct}%; top: ${yPct}%;"
                            title="Entrata zona Q1 — ${z.date} a ${fmtP(z.price)} (P/E ${z.pe}x)"></span>`;
                    });
                }
                if (stats.max_pe_date && stats.max_pe_value != null) {
                    const maxIdx = series.findIndex(s => s.date === stats.max_pe_date);
                    if (maxIdx >= 0) {
                        const xPct = (xOf(maxIdx) / W * 100).toFixed(1);
                        const yPct = (yOf(stats.max_pe_value) / H * 100).toFixed(1);
                        markersHtml += `<span class="ph-marker max"
                            style="left: ${xPct}%; top: ${yPct}%;"
                            title="Picco P/E — ${stats.max_pe_date} a ${fmtP(stats.max_pe_price)} (P/E ${stats.max_pe_value}x)"></span>`;
                    }
                }
            }
            const markersWrap = markersHtml
                ? `<div class="ph-marker-overlay">${markersHtml}</div>`
                : '';

            // HTML overlay labels at the right gutter, positioned by % of chart height.
            const pctOf = y => (y / H * 100).toFixed(1);
            // Hide the "current" label when it would overlap Q1 / median / Q3
            // (within 6% of the chart height of any of them).
            const yCur = stats.current_pe != null ? yOf(stats.current_pe) : null;
            const closeToAnother = (y, threshold) =>
                Math.abs(y - yQ1) < threshold ||
                Math.abs(y - yMed) < threshold ||
                Math.abs(y - yQ3) < threshold;
            const showCurrent = (yCur != null) && !closeToAnother(yCur, H * 0.06);

            const labels = `
                <span class="ph-yaxis-label q3" style="top: ${pctOf(yQ3)}%;">Q3 ${stats.q3}x</span>
                <span class="ph-yaxis-label med" style="top: ${pctOf(yMed)}%;">med ${stats.median}x</span>
                <span class="ph-yaxis-label q1" style="top: ${pctOf(yQ1)}%;">Q1 ${stats.q1}x</span>
                ${showCurrent ? `<span class="ph-yaxis-label current ${dotClass}" style="top: ${pctOf(yCur)}%;">${stats.current_pe}x</span>` : ''}
            `;

            // X-axis date ticks (only when expanded — too cramped at 110px).
            let xLabels = '';
            if (expanded && series.length > 2) {
                const dStart = series[0].date;
                const dMid = series[Math.floor(series.length / 2)].date;
                const dEnd = series[series.length - 1].date;
                xLabels = `
                    <span class="ph-xaxis-label" style="left: 0;">${dStart}</span>
                    <span class="ph-xaxis-label" style="left: calc(50% - 30px); transform: translateX(0);">${dMid}</span>
                    <span class="ph-xaxis-label" style="right: 60px;">${dEnd}</span>
                `;
            }
            return { svg, labels, xLabels, markersWrap };
        }
    })();
</script>
